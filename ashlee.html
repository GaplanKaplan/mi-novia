<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ash Lee ❤️</title>
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ffb3c1;
            --accent: #d63031; /* Un rojo más fuerte para la sorpresa */
            --gold: #f1c40f; /* Dorado para los sobres */
            --bg: #fff5f7;
            --text: #4a4a4a;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 117, 140, 0.2);
            position: relative;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--primary); }
        .counter { font-size: 0.9rem; margin-bottom: 25px; opacity: 0.7; }

        /* Vistas */
        .view { display: none; animation: fadeIn 0.5s ease-in-out; }
        .view.active { display: block; }

        /* Cuadrícula de botones principal */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            aspect-ratio: 1/1;
            border: none;
            border-radius: 20px;
            background: var(--bg);
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }

        .btn:active { transform: scale(0.95); background: var(--primary); color: white; }
        .btn i { font-size: 1.5rem; margin-bottom: 10px; }

        /* Botón Sorpresa Especial */
        .btn-surprise {
            grid-column: 1 / -1;
            aspect-ratio: 3/1;
            background: var(--accent);
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.3);
        }

        /* Área de visualización de frases */
        #display-area {
            margin-top: 20px;
            min-height: 60px;
            padding: 15px;
            border-radius: 15px;
            background: #fff0f3;
            border: 2px solid var(--secondary);
        }

        /* Vista de Cartas Sorpresa */
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .envelope {
            aspect-ratio: 1/1;
            background: var(--gold);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.3s;
            position: relative;
        }

        .envelope:hover { transform: translateY(-5px); }
        .envelope.opened { background: white; border: 2px solid var(--gold); }

        .letter-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px dashed var(--gold);
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #555;
        }

        .back-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid var(--text);
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            opacity: 0.7;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>For Ash Lee ❤️</h1>
        <div class="counter" id="timer">Loading our days...</div>

        <div id="main-view" class="view active">
            <div class="grid">
                <button class="btn" onclick="showRandom('reasons')">✨<br>Reason why I love you</button>
                <button class="btn" onclick="showRandom('memories')">📸<br>A moment of ours</button>
                <button class="btn" onclick="showRandom('plans')">✈️<br>Next adventure</button>
                <button class="btn" onclick="showRandom('compliments')">🎀<br>a compliment</button>
                <button class="btn btn-surprise" onclick="openSurpriseView()">🎁 SURPRISE 💌</button>
            </div>
            <div id="display-area">Tap a button to start.</div>
        </div>

        <div id="surprise-view" class="view">
            <h3>Your 6 Love Letters 💌</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Choose an envelope to open your letter.</p>
            <div class="letter-grid">
                <div class="envelope" id="env-1" onclick="openLetter(1)">💌</div>
                <div class="envelope" id="env-2" onclick="openLetter(2)">💌</div>
                <div class="envelope" id="env-3" onclick="openLetter(3)">💌</div>
                <div class="envelope" id="env-4" onclick="openLetter(4)">💌</div>
                <div class="envelope" id="env-5" onclick="openLetter(5)">💌</div>
                <div class="envelope" id="env-6" onclick="openLetter(6)">💌</div>
            </div>
            <div id="letter-display" class="letter-content"></div>
            <button class="back-btn" onclick="closeSurpriseView()">⬅️ Volver</button>
        </div>
    </div>

    <script>
        // Lógica de fechas (Pon la fecha en que empezaron)
        const startDate = new Date('2025-02-5'); // Ajusta esto: Año-Mes-Día
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerText = `we carry ${days} years creating our history`;
        }
        updateTimer();

        // Contenidos aleatorios (Ya con tus 8 ideas por categoría)
        const database = {
            reasons: [
                "Because of how you make me laugh even on difficult days.",
                "Because of your ambition and the enthusiasm you put into everything.",
                "Because I feel like myself when I'm with you.",
                "Thank you for the attention you give me when I tell you something that excites me.",
                "For the peace you bring me after a long day of work.",
                "Because you're not afraid to say what you think, and that fascinates me.",
                "Because you're the only woman with an open mind",
                "Because you make wanting to be a better version of myself feel natural.",
            ],
            memories: [
                "Our first date.",
                "After I asked for your number, I kept bumping into everything because I was so embarrassed.",
                "when we spent hours talking",
                "When you told me things about yourself and I spent hours listening to you, and I loved it.",
                "The first time I saw you arrive I thought, 'Wow, I can't believe you're here with me.",
                "That message you sent me out of the blue completely changed my mood.",
                "Our last visit; I wished it could have lasted a few more hours.",
            ],
            plans: [
                "Let's go out for dinner at some place you mention to me.",
                "A sunset picnic in the park.",
                "Our first weekend getaway.",
                "Go see that movie you've been wanting to see.",
                "An afternoon at the beach in Tel Aviv, just the two of us and the sunset.",
                "Cook something together from scratch (even if we end up ordering pizza).",
                "A road trip with no fixed destination, just a good playlist and you by my side.",
                "That elegant dinner I want to take you to.",
            ],
            compliments: [
                "You have a smile that lights up any room.",
                "I love your style and your personality.",
                "You are the smartest woman I know.",
                "I love your energy, it's contagious.",
                "You have no idea how incredibly good that color you wore last time looks on you.",
                "I love your problem-solving skills; you're extremely intelligent.",
                "You have such an authentic vibe that it's impossible not to want to be around you.",
                "Your smile is, without a doubt, my favorite notification of the day.",
            ],
        };

        const letters = [
            "My love, these three years have been an incredible journey. Although we haven't seen each other as often as we'd like, every moment, whether physical or digital, has been precious to me. I love discovering who you are and building this with you.",
            "I just wanted to remind you how much I admire your intelligence. Your strength and your outlook on life inspire me every day. You are an exceptional woman.",
            "I love how our communication flows, even from a distance. You make me feel incredibly close, even when we're not together. I can't wait for our next 'us' time.",
            "I was thinking about the future and I'm so excited about everything we can build together. We have three years of history, and I feel like this is just the beginning. I love you.",
            "Thank you for coming into my life at the perfect time. Your laughter is my favorite sound, and your happiness is my priority. I promise to do everything I can to make you smile every day.",
            "This is my sixth letter, and I just want to use it to promise you that, no matter how busy we are, I will always find the time to remind you how important you are to me. You have me by your side."
        ];

        // Lógica Principal
        function showRandom(category) {
            const area = document.getElementById('display-area');
            const list = database[category];
            const random = list[Math.floor(Math.random() * list.length)];
            area.innerHTML = `<strong>${random}</strong>`;
        }

        // Lógica de Sorpresa y Cartas
        function openSurpriseView() {
            document.getElementById('main-view').classList.remove('active');
            document.getElementById('surprise-view').classList.add('active');
        }

        function closeSurpriseView() {
            document.getElementById('surprise-view').classList.remove('active');
            document.getElementById('main-view').classList.add('active');
            // Ocultar carta mostrada
            document.getElementById('letter-display').style.display = 'none';
        }

        function openLetter(index) {
            const letterDisplay = document.getElementById('letter-display');
            
            // Marcar todos los sobres como cerrados, luego abrir el seleccionado
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`env-${i}`).classList.remove('opened');
                document.getElementById(`env-${i}`).innerText = '💌';
            }
            
            document.getElementById(`env-${index}`).classList.add('opened');
            document.getElementById(`env-${index}`).innerText = '📖';

            // Mostrar contenido
            letterDisplay.style.display = 'block';
            letterDisplay.innerHTML = `<p><em>Dear Lera,</em></p><p>${letters[index-1]}</p>`;
        }
    </script>
</body>
</html>
